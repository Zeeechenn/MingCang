site_name: 明仓
site_url: https://Zeeechenn.github.io/MingCang/
site_description: Local-first stock research workbench documentation
docs_dir: docs_public
theme:
  name: material
  language: zh
  font: false
  favicon: assets/favicon.svg
  icon:
    logo: material/chart-timeline-variant
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: teal
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Zeeechenn/MingCang
nav:
  - 文档:
      - 概览: index.md
      - 快速开始: USER_GUIDE.md
      - 安全边界: WHY_NOT_AI_STOCK_PICKER.md
  - 功能:
      - 功能地图: FEATURE_MAP.md
      - 架构: ARCHITECTURE.md
  - 参考:
      - 参考手册: REFERENCE.md
      - 开发指南: DEVELOPER_GUIDE.md
  - GitHub: https://github.com/Zeeechenn/MingCang
