repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements


  - repo: local
    hooks:
      - id: release-hygiene
        name: release hygiene guard
        entry: python3 scripts/check_release_hygiene.py
        language: system
        pass_filenames: false
      - id: check-sensitive-paths
        name: block runtime data and secret-like files
        entry: python3 -m backend.tools.check_sensitive_paths
        language: system
        pass_filenames: true
